<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Календарь занятости</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h2 id="month-year"></h2>

    <div id="calendar-container">

        <div class="calendar-header">
            <button id="prevMonth" style="width:auto;padding:5px 10px;">
                &lt;
            </button>

            <span id="month-display"></span>

            <button id="nextMonth" style="width:auto;padding:5px 10px;">
                &gt;
            </button>
        </div>

        <div class="calendar-grid" id="calendar-grid">
        </div>

    </div>

    <!-- ВОТ ТУТ ПАНЕЛЬ ДНЯ -->
	<div id="dayPanel" class="sheet">
		<div class="sheet-handle"></div>

		<h3 id="panelDate"></h3>

		<select id="statusSelect" class="tg-input">
			<option value="none">Нет занятости</option>
			<option value="pending">На утверждении</option>
			<option value="approved">Утверждена съёмка</option>
		</select>

		<textarea id="noteInput" class="tg-input" placeholder="Заметка..."></textarea>

		<button id="saveDayBtn" class="tg-button">
			Сохранить
		</button>
	</div>

	<div id="sheetBackdrop"></div>

    <script src="app.js"></script>

</body>
</html>
