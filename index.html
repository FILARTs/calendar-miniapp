<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Календарь занятости</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h2 id="month-year"></h2>

    <div id="calendar-container">

        <div class="calendar-header">
            <button id="prevMonth" style="width:auto;padding:5px 10px;">
                &lt;
            </button>

            <button id="nextMonth" style="width:auto;padding:5px 10px;">
                &gt;
            </button>
        </div>

        <div class="calendar-grid" id="calendar-grid"></div>

        <!-- АНКЕТЫ -->

        <div class="profiles-section">

            <button
                class="tg-button"
                onclick="openProfileSheet(1)"
            >
                Кино
            </button>

            <button
                class="tg-button"
                onclick="openProfileSheet(2)"
            >
                Реклама
            </button>

            <button
                class="tg-button"
                onclick="openProfileSheet(3)"
            >
                Другое
            </button>

        </div>

    </div>

    <!-- ПАНЕЛЬ КАЛЕНДАРЯ -->

    <div id="dayPanel" class="sheet">

        <div class="sheet-handle"></div>

        <h3 id="panelDate"></h3>

        <select id="statusSelect" class="tg-input">
            <option value="none">Нет занятости</option>
            <option value="pending">На утверждении</option>
            <option value="approved">Утверждена съёмка</option>
        </select>

        <textarea
            id="noteInput"
            class="tg-input"
            placeholder="Заметка..."
        ></textarea>

    </div>

    <!-- ПАНЕЛЬ АНКЕТ -->

    <div id="profileSheet" class="sheet">

        <div class="sheet-handle"></div>

        <h3 id="profileTitle">
            Анкета
        </h3>

        <textarea
            id="profileInput"
            class="tg-input"
            placeholder="Введите текст анкеты..."
        ></textarea>

        <button
            class="tg-button"
            onclick="saveProfile()"
        >
            💾 Сохранить
        </button>

        <button
            class="tg-button"
            onclick="copyProfile()"
        >
            📋 Скопировать
        </button>

        <button
            id="openChatBtn"
            class="tg-button"
            style="display:none;"
            onclick="openCastingChat()"
        >
            ✈️ Отправить
        </button>

    </div>

    <div id="sheetBackdrop"></div>

    <script src="app.js"></script>

</body>
</html>
