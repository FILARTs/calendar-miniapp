<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Availability Calendar</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h2 id="month-year"></h2>

    <div id="calendar-container">

        <div class="calendar-header">
            <button id="prevMonth" style="width:auto;padding:5px 10px;">
                &lt;
            </button>

            <span id="month-display"></span>

            <button id="nextMonth" style="width:auto;padding:5px 10px;">
                &gt;
            </button>
        </div>

        <div class="calendar-grid" id="calendar-grid">
        </div>

    </div>

    <div class="controls">
        <button id="saveBtn">
            Save Availability
        </button>
    </div>

    <!-- ВОТ ТУТ ПАНЕЛЬ ДНЯ -->
    <div id="dayPanel" style="display:none; margin-top:20px; width:100%; max-width:400px; padding:10px; border-radius:10px; background:#f2f2f2;">
        
        <h3 id="panelDate"></h3>

        <select id="statusSelect">
            <option value="free">Нет занятости</option>
            <option value="busy">Занято</option>
            <option value="pending">На утверждении</option>
            <option value="approved">Утверждена съёмка</option>
        </select>

        <textarea id="noteInput" placeholder="Заметка..." style="width:100%; height:80px; margin-top:10px;"></textarea>

        <button id="saveDayBtn" style="margin-top:10px; width:100%;">
            Сохранить
        </button>

    </div>

    <script src="app.js"></script>

</body>
</html>
